[PATHS]
# PROJECT_ROOT is dynamically determined in the code (e.g., using Path.cwd())
# All paths below are relative to the PROJECT_ROOT
DATA_DIR = data 
ASSETS_DIR = assets
TRAIN_FILE = data/sales.csv
TEST_FILE = data/sample_submission.csv

# The final prediction file will be exported directly to the project root
OUT_FILE = submission.csv

[VALID]
# Date used to split the Train and Validation datasets (prevents data leakage)
split_date = 2022-10-01

[SETTINGS]
# Number of Optuna trials for hyperparameter tuning (optimized for speed & efficiency)
N_TRIALS = 15

# Utilize all available CPU cores for parallel processing and faster training
N_JOBS = -1 

# Target variables to forecast
TARGET_COLS = Revenue, COGS 